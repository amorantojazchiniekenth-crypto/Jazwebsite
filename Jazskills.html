<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
    font-family:'Poppins',sans-serif;
}

body{
    background: lightblue;
    color:#333;
}

/* NAVBAR */
nav{
    position:fixed;
    width:100%;
    top:0;
    left:0;
    background:white;
    padding:25px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:1 5px 20px rgba(0,0,0,0.05);
    z-index:1000;
}

nav h2{
    color:#6C63FF;
}

nav ul{
    list-style:none;
    display:flex;
    gap:30px;
}

nav ul li a{
    text-decoration:none;
    color:#333;
    font-weight:500;
    transition:0.3s;
}

nav ul li a:hover{
    color:#6C63FF;
}

/* SECTIONS */
section{
    min-height:100vh;
    padding:120px 8% 80px;
    display:flex;
    align-items:center;
}

/* HERO */
.hero{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
}

.hero-text{
    flex:1;
    animation:fadeInLeft 1s ease forwards;
}

.hero-text h1{
    font-size:48px;
    margin-bottom:20px;
}

.hero-text span{
    color:#6C63FF;
}

.hero-text p{
    margin-bottom:30px;
    color:#555;
}

.buttons button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin-right:15px;
    font-weight:500;
    transition:0.3s;
}

.primary{
    background:linear-gradient(45deg,#6C63FF,#7F7FD5);
    color:white;
}

.primary:hover{
    transform:translateY(-3px);
}

.secondary{
    background:#e0e0ff;
}

.hero-img{
    flex:1;
    text-align:center;
    animation:fadeInRight 1s ease forwards;
}

.hero-img img{
    width:20px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

/* ABOUT */
.about{
    flex-direction:column;
    text-align:center;
}

.about h2{
    font-size:36px;
    margin-bottom:20px;
    color:#6C63FF;
}

.about p{
    max-width:600px;
    margin:auto;
    color:#555;
}

/* PROJECTS */
.projects{
    flex-direction:column;
    text-align:center;
}

.project-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
    margin-top:40px;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

/* CONTACT */
.contact{
    flex-direction:column;
    text-align:center;
}

.contact form{
    display:flex;
    flex-direction:column;
    gap:30px;
    width:300px;
    margin-top:30px;
}

.contact input, .contact textarea{
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#6C63FF;
    color:white;
}

/* ANIMATIONS */
@keyframes fadeInLeft{
    from{opacity:0; transform:translateX(-50px);}
    to{opacity:1; transform:translateX(0);}
}

@keyframes fadeInRight{
    from{opacity:0; transform:translateX(50px);}
    to{opacity:1; transform:translateX(0);}
}

/* RESPONSIVE */
@media(max-width:768px){
    .hero{
        flex-direction:column;
        text-align:center;
    }

    .hero-img img{
        margin-top:10px;
        width:100px;
    }
.   img{
    width: 180px;
    height: 180px;
    border-radius: 100%;
    border: 5px solid white;
    object-fit: cover;
    margin-bottom: 20px;
    nav ul{
        gap:15px;
    }
}
</style>
</head>
